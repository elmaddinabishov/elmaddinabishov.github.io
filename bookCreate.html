<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitab Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: #1a1a1a;
    color: #e0d8cc;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container {
    width: 100%;
    max-width: 680px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: normal;
    margin-bottom: 2rem;
    color: #c8b89a;
    letter-spacing: 0.05em;
  }
  label {
    display: block;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.5rem;
  }
  input, textarea {
    width: 100%;
    background: #252525;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e0d8cc;
    font-family: Georgia, serif;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.5rem;
  }
  input:focus, textarea:focus {
    border-color: #c8b89a;
  }
  textarea {
    resize: vertical;
    min-height: 300px;
    line-height: 1.7;
  }
  button {
    width: 100%;
    background: #c8b89a;
    color: #1a1a1a;
    border: none;
    border-radius: 6px;
    font-family: Georgia, serif;
    font-size: 1rem;
    font-weight: bold;
    padding: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #d9caaa; }
  button:active { transform: scale(0.99); }
  .note {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: #666;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="container">
  <h1>📖 Kitab Oxucu — Generator</h1>

  <label for="title">Kitab / Səhifə başlığı</label>
  <input type="text" id="title" placeholder="məs. Dünyanın Sonuna Səyahət — I Fəsil">

  <label for="content">Mətn məzmunu</label>
  <textarea id="content" placeholder="Kitabdan kopyaladığın mətni bura yapışdır..."></textarea>

  <button onclick="generate()">⬇ HTML kimi yüklə</button>

  <p class="note">
    Mətn avtomatik cümlələrə bölünəcək. Hər ekrana sığan qədər göstəriləcək,
    artıq hissə növbəti səhifəyə keçəcək. Qaldığın yer yadda saxlanacaq.
  </p>
</div>

<script>
function generate() {
  const title = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();

  if (!title) { alert('Başlıq daxil edin'); return; }
  if (!content) { alert('Mətn daxil edin'); return; }

  const cleanedContent = cleanText(content);
  const html = buildReaderHTML(title, cleanedContent);

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safeTitle = title.replace(/[^a-zA-Z0-9\u0400-\u04FF\u0100-\u024F\s]/g, '').trim().replace(/\s+/g, '-').toLowerCase();
  a.download = (safeTitle || 'kitab') + '.html';
  a.click();
  URL.revokeObjectURL(url);
}

function cleanText(raw) {
  // Normalize whitespace and line breaks
  let text = raw
    .replace(/\r\n/g, '\n')
    .replace(/\r/g, '\n')
    .replace(/[ \t]+/g, ' ')      // multiple spaces → one
    .replace(/\n{3,}/g, '\n\n')   // 3+ newlines → 2
    .trim();

  // Split into paragraphs by double newlines
  const paragraphs = text.split(/\n\n+/).map(p => p.replace(/\n/g, ' ').trim()).filter(Boolean);

  // For each paragraph, split into sentences intelligently
  const result = [];
  for (const para of paragraphs) {
    const sentences = splitSentences(para);
    // Group every 5 sentences into a paragraph for readability
    for (let i = 0; i < sentences.length; i += 5) {
      const chunk = sentences.slice(i, i + 5).join(' ');
      result.push(chunk);
    }
  }
  return result; // array of paragraph strings
}

function splitSentences(text) {
  // Split on sentence-ending punctuation followed by space+capital or end
  const raw = text.match(/[^.!?…]+(?:[.!?…]+(?=\s+[A-ZА-ЯƏÜÖĞIİÇŞ]|$)|[.!?…]+$|$)/g) || [text];
  return raw.map(s => s.trim()).filter(Boolean);
}

function buildReaderHTML(title, paragraphs) {
  const paragraphsJSON = JSON.stringify(paragraphs);
  const storageKey = 'reader_page_' + btoa(encodeURIComponent(title)).substring(0, 20);

  return `<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escapeHtml(title)}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=EB+Garamond:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F0E8;
    --text: #2C2416;
    --text-muted: #8a7a66;
    --accent: #8B6914;
    --border: #D4C9B0;
    --page-bg: #FAF6EE;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
  }

  body {
    display: flex;
    flex-direction: column;
    font-family: 'Lora', 'EB Garamond', Georgia, serif;
  }

  /* TOP BAR */
  .topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--page-bg);
  }
  .topbar-title {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-style: italic;
    max-width: 60%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .page-indicator {
    font-size: 0.82rem;
    color: var(--text-muted);
    font-family: 'Lora', serif;
    white-space: nowrap;
  }

  /* READING AREA */
  .reading-area {
    flex: 1;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    position: relative;
  }

  /* NAV ARROWS */
  .nav-btn {
    flex-shrink: 0;
    width: 56px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--border);
    font-size: 1.4rem;
    transition: color 0.2s;
    user-select: none;
  }
  .nav-btn:hover { color: var(--accent); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  /* PAGE CONTENT */
  .page-content {
    flex: 1;
    overflow: hidden;
    padding: 3rem 1rem;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .inner-content {
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
  }

  .para {
    font-size: 1.13rem;
    line-height: 1.9;
    color: var(--text);
    margin-bottom: 1.4em;
    text-align: justify;
    hyphens: auto;
  }

  /* BOTTOM BAR */
  .bottombar {
    flex-shrink: 0;
    padding: 0.6rem 2rem 0.8rem;
    background: var(--page-bg);
    border-top: 1px solid var(--border);
  }
  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 0.4rem;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
  }

  /* Page turn animation */
  .page-content.turning {
    animation: pageTurn 0.18s ease;
  }
  @keyframes pageTurn {
    0%   { opacity: 1; transform: translateX(0); }
    50%  { opacity: 0; transform: translateX(-12px); }
    100% { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">${escapeHtml(title)}</div>
  <div class="page-indicator" id="pageIndicator">— / —</div>
</div>

<div class="reading-area">
  <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">&#8249;</button>
  <div class="page-content" id="pageContent">
    <div class="inner-content" id="innerContent"></div>
  </div>
  <button class="nav-btn" id="nextBtn" onclick="changePage(1)">&#8250;</button>
</div>

<div class="bottombar">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">0%</div>
</div>

<script>
const PARAGRAPHS = ${paragraphsJSON};
const STORAGE_KEY = '${storageKey}';

let pages = [];         // array of paragraph-index arrays per page
let currentPage = 0;

// ─── Build pages by measuring text height ───
function buildPages() {
  const pageContent = document.getElementById('pageContent');
  const inner = document.getElementById('innerContent');

  // Available height for text
  const availableH = pageContent.clientHeight;

  // Temp container for measuring
  const measurer = document.createElement('div');
  measurer.className = 'inner-content';
  measurer.style.cssText = 'position:absolute;visibility:hidden;pointer-events:none;top:0;left:0;width:' + inner.clientWidth + 'px;';
  document.body.appendChild(measurer);

  pages = [];
  let currentPageParas = [];
  let currentH = 0;
  const MARGIN_BOTTOM_PX = 22; // approx 1.4em at 1.13rem*16px

  for (let i = 0; i < PARAGRAPHS.length; i++) {
    const p = document.createElement('p');
    p.className = 'para';
    p.textContent = PARAGRAPHS[i];
    measurer.appendChild(p);
    const h = p.offsetHeight + MARGIN_BOTTOM_PX;

    if (currentPageParas.length > 0 && currentH + h > availableH) {
      // This paragraph doesn't fit — start a new page
      pages.push(currentPageParas);
      currentPageParas = [i];
      currentH = h;
    } else {
      currentPageParas.push(i);
      currentH += h;
    }
    measurer.removeChild(p);
  }

  if (currentPageParas.length > 0) {
    pages.push(currentPageParas);
  }

  document.body.removeChild(measurer);
}

// ─── Render current page ───
function renderPage(animate) {
  const inner = document.getElementById('innerContent');
  const pageContent = document.getElementById('pageContent');

  if (animate) {
    pageContent.classList.remove('turning');
    void pageContent.offsetWidth;
    pageContent.classList.add('turning');
  }

  inner.innerHTML = '';
  const paraIndices = pages[currentPage] || [];
  for (const idx of paraIndices) {
    const p = document.createElement('p');
    p.className = 'para';
    p.textContent = PARAGRAPHS[idx];
    inner.appendChild(p);
  }

  const total = pages.length;
  const current = currentPage + 1;
  document.getElementById('pageIndicator').textContent = current + ' / ' + total;

  const pct = total <= 1 ? 100 : Math.round((currentPage / (total - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';

  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= total - 1;

  // Save progress
  try { localStorage.setItem(STORAGE_KEY, currentPage); } catch(e) {}
}

function changePage(dir) {
  const newPage = currentPage + dir;
  if (newPage < 0 || newPage >= pages.length) return;
  currentPage = newPage;
  renderPage(true);
  window.scrollTo(0, 0);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
});

// ─── Init ───
window.addEventListener('load', () => {
  buildPages();

  // Restore saved page
  let saved = 0;
  try { saved = parseInt(localStorage.getItem(STORAGE_KEY)) || 0; } catch(e) {}
  currentPage = Math.min(saved, Math.max(0, pages.length - 1));

  renderPage(false);
});

// Rebuild on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const savedPage = currentPage;
    buildPages();
    // Try to stay near same paragraph
    currentPage = Math.min(savedPage, Math.max(0, pages.length - 1));
    renderPage(false);
  }, 300);
});
<\/script>
</body>
</html>`;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
