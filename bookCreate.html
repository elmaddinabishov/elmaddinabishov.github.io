<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitab Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: #1a1a1a;
    color: #e0d8cc;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container { width: 100%; max-width: 680px; }
  h1 { font-size: 1.4rem; font-weight: normal; margin-bottom: 2rem; color: #c8b89a; letter-spacing: 0.05em; }
  label { display: block; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 0.5rem; }
  input, textarea {
    width: 100%; background: #252525; border: 1px solid #333; border-radius: 6px;
    color: #e0d8cc; font-family: Georgia, serif; font-size: 1rem;
    padding: 0.75rem 1rem; outline: none; transition: border-color 0.2s; margin-bottom: 1.5rem;
  }
  input:focus, textarea:focus { border-color: #c8b89a; }
  textarea { resize: vertical; min-height: 300px; line-height: 1.7; }
  button {
    width: 100%; background: #c8b89a; color: #1a1a1a; border: none; border-radius: 6px;
    font-family: Georgia, serif; font-size: 1rem; font-weight: bold; padding: 0.9rem;
    cursor: pointer; letter-spacing: 0.05em; transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #d9caaa; }
  button:active { transform: scale(0.99); }
  .note { margin-top: 1rem; font-size: 0.8rem; color: #666; line-height: 1.5; }
</style>
</head>
<body>
<div class="container">
  <h1>📖 Kitab Oxucu — Generator</h1>
  <label for="title">Kitab / Səhifə başlığı</label>
  <input type="text" id="title" placeholder="məs. Dünyanın Sonuna Səyahət — I Fəsil">
  <label for="content">Mətn məzmunu</label>
  <textarea id="content" placeholder="Kitabdan kopyaladığın mətni bura yapışdır..."></textarea>
  <button onclick="generate()">⬇ HTML kimi yüklə</button>
  <p class="note">Mətn avtomatik cümlələrə bölünəcək. Hər ekrana sığan qədər göstəriləcək, artıq hissə növbəti səhifəyə keçəcək. Qaldığın yer yadda saxlanacaq.</p>
</div>

<script>
function generate() {
  const title = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();
  if (!title) { alert('Başlıq daxil edin'); return; }
  if (!content) { alert('Mətn daxil edin'); return; }
  const paragraphs = cleanText(content);
  const html = buildReaderHTML(title, paragraphs);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safe = title.replace(/[^a-zA-Z0-9\u0400-\u04FF\u0100-\u024F\s]/g,'').trim().replace(/\s+/g,'-').toLowerCase();
  a.download = (safe || 'kitab') + '.html';
  a.click();
  URL.revokeObjectURL(url);
}

function cleanText(raw) {
  let text = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/[ \t]+/g,' ').replace(/\n{3,}/g,'\n\n').trim();
  const paragraphs = text.split(/\n\n+/).map(p => p.replace(/\n/g,' ').trim()).filter(Boolean);
  const result = [];
  for (const para of paragraphs) {
    const sentences = splitSentences(para);
    for (let i = 0; i < sentences.length; i += 5) {
      result.push(sentences.slice(i, i+5).join(' '));
    }
  }
  return result;
}

function splitSentences(text) {
  const raw = text.match(/[^.!?…]+(?:[.!?…]+(?=\s+[A-ZА-ЯƏÜÖĞIİÇŞ]|$)|[.!?…]+$|$)/g) || [text];
  return raw.map(s => s.trim()).filter(Boolean);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/`/g,'&#96;').replace(/\$/g,'&#36;');
}

function buildReaderHTML(title, paragraphs) {
  const paragraphsJSON = JSON.stringify(paragraphs);
  const storageKey = 'reader_' + btoa(encodeURIComponent(title.substring(0,30))).replace(/[^a-zA-Z0-9]/g,'').substring(0,24);
  const escapedTitle = escapeHtml(title);

  return `<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>${escapedTitle}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEMES ── */
body.theme-day{
  --bg:#F5F0E8;--page-bg:#FAF6EE;--text:#2C2416;--text-muted:#8a7a66;
  --accent:#8B6914;--border:#D4C9B0;--nav-hover:#8B6914;
  --panel-bg:#FAF6EE;--panel-border:#D4C9B0;--overlay:rgba(44,36,22,0.18);
}
body.theme-night{
  --bg:#181510;--page-bg:#1E1B16;--text:#D4C9B0;--text-muted:#7a6e5f;
  --accent:#C8A84B;--border:#33302A;--nav-hover:#C8A84B;
  --panel-bg:#22201A;--panel-border:#3a3730;--overlay:rgba(0,0,0,0.45);
}
body.theme-sepia{
  --bg:#EDE0CC;--page-bg:#F2E8D8;--text:#3B2D1F;--text-muted:#7a6858;
  --accent:#7B4F2E;--border:#C8B89A;--nav-hover:#7B4F2E;
  --panel-bg:#F2E8D8;--panel-border:#C8B89A;--overlay:rgba(59,45,31,0.15);
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);transition:background 0.3s,color 0.3s}
body{display:flex;flex-direction:column;font-family:'Lora',Georgia,serif;touch-action:pan-y}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0.65rem 1.2rem;border-bottom:1px solid var(--border);background:var(--page-bg);
  gap:0.5rem;transition:background 0.3s,border-color 0.3s;
}
.topbar-title{font-size:0.82rem;color:var(--text-muted);font-style:italic;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.page-indicator{font-size:0.8rem;color:var(--text-muted);white-space:nowrap;flex-shrink:0}

/* ── READING AREA ── */
.reading-area{flex:1;display:flex;align-items:stretch;overflow:hidden;position:relative;min-height:0}

/* ── NAV BUTTONS ── */
.nav-btn{
  flex-shrink:0;width:48px;background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--border);font-size:2rem;transition:color 0.2s;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn:hover{color:var(--nav-hover)}
.nav-btn:disabled{opacity:0.18;cursor:default}

/* ── PAGE CONTENT ── */
.page-content{
  flex:1;overflow:hidden;
  padding:30px 25px;
  display:flex;flex-direction:column;justify-content:flex-start;
  position:relative;
}
.inner-content{max-width:640px;width:100%;margin:0 auto}

.para{
  font-size:1.08rem;line-height:1.88;color:var(--text);
  margin-bottom:1.35em;text-align:justify;hyphens:auto;
  transition:color 0.3s,font-size 0.2s;
}

/* ── BOTTOM BAR ── */
.bottombar{
  flex-shrink:0;padding:0.5rem 1.2rem 0.7rem;
  background:var(--page-bg);border-top:1px solid var(--border);
  transition:background 0.3s,border-color 0.3s;
}
.progress-row{display:flex;align-items:center;gap:0.7rem}
.progress-track{
  flex:1;height:6px;background:var(--border);border-radius:3px;
  overflow:visible;cursor:pointer;position:relative;
}
.progress-fill{
  height:100%;background:var(--accent);border-radius:3px;
  transition:width 0.35s ease;pointer-events:none;
}
.progress-thumb{
  position:absolute;top:50%;right:0;transform:translate(50%,-50%);
  width:13px;height:13px;background:var(--accent);border-radius:50%;
  pointer-events:none;transition:opacity 0.2s;opacity:0;
}
.progress-track:hover .progress-thumb{opacity:1}
.progress-label{font-size:0.73rem;color:var(--text-muted);white-space:nowrap;flex-shrink:0;min-width:2.8rem;text-align:right}
.settings-btn{
  background:none;border:none;cursor:pointer;color:var(--text-muted);
  font-size:1.25rem;padding:0.1rem 0.2rem;line-height:1;
  transition:color 0.2s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.settings-btn:hover{color:var(--accent)}

/* ── SETTINGS PANEL ── */
.panel-overlay{
  position:fixed;inset:0;background:var(--overlay);z-index:100;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.panel-overlay.open{opacity:1;pointer-events:all}
.settings-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--panel-bg);border-top:1px solid var(--panel-border);
  border-radius:18px 18px 0 0;z-index:101;
  transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);
  padding:1.2rem 1.4rem 2rem;max-height:55vh;overflow-y:auto;
}
.settings-panel.open{transform:translateY(0)}
.panel-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.2rem;cursor:pointer}
.panel-title{font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.theme-row{display:flex;gap:0.6rem;margin-bottom:1.4rem}
.theme-btn{
  flex:1;padding:0.7rem 0.3rem;border:2px solid var(--panel-border);border-radius:10px;
  background:transparent;color:var(--text);font-family:'Lora',Georgia,serif;font-size:0.82rem;
  cursor:pointer;transition:border-color 0.2s,background 0.2s;text-align:center;
}
.theme-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
.theme-btn:not(.active):hover{border-color:var(--accent)}
.font-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem}
.font-label{font-size:0.78rem;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0}
.font-btn{
  width:40px;height:40px;border:1px solid var(--panel-border);border-radius:8px;
  background:transparent;color:var(--text);font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color 0.2s,background 0.2s;flex-shrink:0;
}
.font-btn:hover{border-color:var(--accent);background:var(--accent);color:#fff}
.font-size-display{font-size:0.9rem;color:var(--text-muted);min-width:2.5rem;text-align:center;flex-shrink:0}
.goto-row{display:flex;align-items:center;gap:0.7rem;margin-bottom:1rem}
.goto-input{
  flex:1;background:transparent;border:1px solid var(--panel-border);border-radius:8px;
  color:var(--text);font-family:'Lora',Georgia,serif;font-size:0.9rem;
  padding:0.5rem 0.8rem;outline:none;transition:border-color 0.2s;
}
.goto-input:focus{border-color:var(--accent)}
.goto-btn{
  padding:0.5rem 1rem;background:var(--accent);color:#fff;border:none;border-radius:8px;
  font-family:'Lora',Georgia,serif;font-size:0.85rem;cursor:pointer;white-space:nowrap;
  transition:opacity 0.2s;
}
.goto-btn:hover{opacity:0.85}
/* ── PAGE GRID ── */
.page-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(44px,1fr));
  gap:6px;
  max-height:160px;
  overflow-y:auto;
  padding:2px 1px 4px;
}
.page-grid::-webkit-scrollbar{width:4px}
.page-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.pg-cell{
  height:36px;border:1.5px solid var(--panel-border);border-radius:7px;
  background:transparent;color:var(--text-muted);font-family:'Lora',Georgia,serif;
  font-size:0.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color 0.15s,background 0.15s,color 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.pg-cell:hover{border-color:var(--accent);color:var(--accent)}
.pg-cell.current{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:bold}
.pg-cell.read{border-color:var(--border);background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--text-muted)}
.panel-close{
  position:absolute;top:1rem;right:1.2rem;background:none;border:none;
  font-size:1.3rem;color:var(--text-muted);cursor:pointer;line-height:1;
  -webkit-tap-highlight-color:transparent;
}

/* ── PAGE TURN ANIMATION ── */
.page-content.turning{animation:turn 0.2s ease}
@keyframes turn{0%{opacity:1;transform:translateX(0)}50%{opacity:0;transform:translateX(-10px)}100%{opacity:1;transform:translateX(0)}}
</style>
</head>
<body class="theme-day">

<div class="topbar">
  <div class="topbar-title">${escapedTitle}</div>
  <div class="page-indicator" id="pageIndicator">— / —</div>
</div>

<div class="reading-area" id="readingArea">
  <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">&#8249;</button>
  <div class="page-content" id="pageContent">
    <div class="inner-content" id="innerContent"></div>
  </div>
  <button class="nav-btn" id="nextBtn" onclick="changePage(1)">&#8250;</button>
</div>

<div class="bottombar">
  <div class="progress-row">
    <div class="progress-track" id="progressTrack" onclick="seekByProgress(event)">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
      <div class="progress-thumb" id="progressThumb"></div>
    </div>
    <div class="progress-label" id="progressLabel">0%</div>
    <button class="settings-btn" onclick="openPanel()" title="Parametrlər">⚙</button>
  </div>
</div>

<!-- OVERLAY + PANEL -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="settings-panel" id="settingsPanel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div class="panel-handle" onclick="closePanel()"></div>

  <div class="panel-title">Tema</div>
  <div class="theme-row">
    <button class="theme-btn active" id="btn-day"    onclick="setTheme('day')">☀ Gündüz</button>
    <button class="theme-btn"        id="btn-night"  onclick="setTheme('night')">🌙 Gecə</button>
    <button class="theme-btn"        id="btn-sepia"  onclick="setTheme('sepia')">📜 Sepia</button>
  </div>

  <div class="panel-title">Şrift ölçüsü</div>
  <div class="font-row">
    <span class="font-label">A</span>
    <button class="font-btn" onclick="changeFontSize(-1)">−</button>
    <span class="font-size-display" id="fontSizeDisplay">17px</span>
    <button class="font-btn" onclick="changeFontSize(1)">+</button>
  </div>

  <div class="panel-title" style="margin-top:0.4rem">Səhifəyə get</div>
  <div class="goto-row">
    <input class="goto-input" id="gotoInput" type="number" min="1" placeholder="Səhifə nömrəsi...">
    <button class="goto-btn" onclick="goToPage()">Get</button>
  </div>
  <div class="page-grid" id="pageGrid"></div>
</div>

<script>
const PARAGRAPHS = ${paragraphsJSON};
const STORAGE_KEY = '${storageKey}';
const SETTINGS_KEY = '${storageKey}_settings';

let pages = [];
let currentPage = 0;
let currentFontSize = 17;
let currentTheme = 'day';

// ── Load saved settings ──
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    if (s.theme) currentTheme = s.theme;
    if (s.fontSize) currentFontSize = s.fontSize;
  } catch(e) {}
}

function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify({ theme: currentTheme, fontSize: currentFontSize })); } catch(e) {}
}

// ── Theme ──
function setTheme(t) {
  currentTheme = t;
  document.body.className = 'theme-' + t;
  ['day','night','sepia'].forEach(x => {
    document.getElementById('btn-' + x).classList.toggle('active', x === t);
  });
  saveSettings();
  // Rebuild because colours affect nothing structural, no rebuild needed
}

// ── Font size ──
function applyFontSize() {
  document.querySelectorAll('.para').forEach(p => p.style.fontSize = currentFontSize + 'px');
  document.getElementById('fontSizeDisplay').textContent = currentFontSize + 'px';
}

function changeFontSize(delta) {
  currentFontSize = Math.min(28, Math.max(12, currentFontSize + delta));
  saveSettings();
  // Rebuild pages because font size changes heights
  const savedParaIdx = (pages[currentPage] || [])[0] || 0;
  buildPages();
  // Jump to page containing same paragraph
  currentPage = 0;
  for (let i = 0; i < pages.length; i++) {
    if (pages[i].includes(savedParaIdx)) { currentPage = i; break; }
  }
  renderPage(false);
}

// ── Build pages by measuring ──
function buildPages() {
  const pageContent = document.getElementById('pageContent');
  const inner = document.getElementById('innerContent');
  // Account for top+bottom padding (30px each = 60px)
  const availableH = pageContent.clientHeight - 0; // padding already in clientHeight calc — use offsetHeight minus padding
  const padV = 60; // 30px top + 30px bottom
  const contentH = pageContent.clientHeight - padV;

  const measurer = document.createElement('div');
  measurer.className = 'inner-content';
  measurer.style.cssText = 'position:absolute;visibility:hidden;pointer-events:none;top:-9999px;left:0;width:' + inner.clientWidth + 'px;';
  document.body.appendChild(measurer);

  pages = [];
  let curParas = [];
  let curH = 0;
  const GAP = Math.round(currentFontSize * 1.35); // approx margin-bottom

  for (let i = 0; i < PARAGRAPHS.length; i++) {
    const p = document.createElement('p');
    p.className = 'para';
    p.style.fontSize = currentFontSize + 'px';
    p.textContent = PARAGRAPHS[i];
    measurer.appendChild(p);
    const h = p.offsetHeight + GAP;
    measurer.removeChild(p);

    if (curParas.length > 0 && curH + h > contentH) {
      pages.push(curParas);
      curParas = [i];
      curH = h;
    } else {
      curParas.push(i);
      curH += h;
    }
  }
  if (curParas.length > 0) pages.push(curParas);
  document.body.removeChild(measurer);
  // Update goto max
  const gi = document.getElementById('gotoInput');
  if (gi) gi.max = pages.length;
  buildPageGrid();
}

// ── Render ──
function renderPage(animate) {
  const inner = document.getElementById('innerContent');
  const pc = document.getElementById('pageContent');
  if (animate) { pc.classList.remove('turning'); void pc.offsetWidth; pc.classList.add('turning'); }

  inner.innerHTML = '';
  (pages[currentPage] || []).forEach(idx => {
    const p = document.createElement('p');
    p.className = 'para';
    p.style.fontSize = currentFontSize + 'px';
    p.textContent = PARAGRAPHS[idx];
    inner.appendChild(p);
  });

  const total = pages.length;
  const cur = currentPage + 1;
  document.getElementById('pageIndicator').textContent = cur + ' / ' + total;

  const pct = total <= 1 ? 100 : Math.round((currentPage / (total - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressThumb').style.right = (100 - pct) + '%';
  document.getElementById('progressLabel').textContent = pct + '%';

  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= total - 1;

  try { localStorage.setItem(STORAGE_KEY, currentPage); } catch(e) {}
  updatePageGridHighlight();
}

function changePage(dir) {
  const np = currentPage + dir;
  if (np < 0 || np >= pages.length) return;
  currentPage = np;
  renderPage(true);
}

// ── Progress bar seek ──
function seekByProgress(e) {
  const track = document.getElementById('progressTrack');
  const rect = track.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  currentPage = Math.round(ratio * (pages.length - 1));
  renderPage(true);
}

// ── Go to page ──
function goToPage() {
  const val = parseInt(document.getElementById('gotoInput').value);
  if (isNaN(val)) return;
  currentPage = Math.max(0, Math.min(pages.length - 1, val - 1));
  renderPage(true);
  closePanel();
}

// ── Page grid ──
function buildPageGrid() {
  const grid = document.getElementById('pageGrid');
  if (!grid) return;
  grid.innerHTML = '';
  for (let i = 0; i < pages.length; i++) {
    const cell = document.createElement('button');
    cell.className = 'pg-cell' + (i < currentPage ? ' read' : '') + (i === currentPage ? ' current' : '');
    cell.textContent = i + 1;
    cell.dataset.page = i;
    cell.addEventListener('click', function() {
      currentPage = parseInt(this.dataset.page);
      renderPage(true);
      closePanel();
    });
    grid.appendChild(cell);
  }
  // Scroll current into view
  const cur = grid.querySelector('.current');
  if (cur) cur.scrollIntoView({block:'nearest', inline:'nearest'});
}

function updatePageGridHighlight() {
  const cells = document.querySelectorAll('.pg-cell');
  cells.forEach((c, i) => {
    c.classList.toggle('current', i === currentPage);
    c.classList.toggle('read', i < currentPage);
  });
  const cur = document.querySelector('.pg-cell.current');
  if (cur) cur.scrollIntoView({block:'nearest', inline:'nearest'});
}

// ── Settings panel ──
function openPanel() {
  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('settingsPanel').classList.add('open');
}
function closePanel() {
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('settingsPanel').classList.remove('open');
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
  if (e.key === 'Enter') { if (document.getElementById('gotoInput') === document.activeElement) goToPage(); }
});

// ── Touch / swipe ──
let touchStartX = 0, touchStartY = 0;
document.getElementById('readingArea').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('readingArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    changePage(dx < 0 ? 1 : -1);
  }
}, {passive:true});

// ── Resize ──
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const firstPara = (pages[currentPage] || [])[0] || 0;
    buildPages();
    currentPage = 0;
    for (let i = 0; i < pages.length; i++) { if ((pages[i]||[]).includes(firstPara)) { currentPage = i; break; } }
    renderPage(false);
  }, 300);
});

// ── Init ──
window.addEventListener('load', () => {
  loadSettings();
  document.body.className = 'theme-' + currentTheme;
  ['day','night','sepia'].forEach(x => document.getElementById('btn-' + x).classList.toggle('active', x === currentTheme));
  document.getElementById('fontSizeDisplay').textContent = currentFontSize + 'px';

  buildPages();
  let saved = 0;
  try { saved = parseInt(localStorage.getItem(STORAGE_KEY)) || 0; } catch(e) {}
  currentPage = Math.min(saved, Math.max(0, pages.length - 1));
  renderPage(false);
});
<\/script>
</body>
</html>`;
}
</script>
